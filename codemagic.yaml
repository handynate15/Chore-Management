# ─── OnTrackFam - Codemagic CI/CD Configuration ───────────────────────────────
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-flutter-app/

workflows:

  # ── iOS TestFlight Workflow ──────────────────────────────────────────────────
  ios-testflight:
    name: OnTrackFam iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.35.4
      xcode: latest
      cocoapods: default
      groups:
        - ios_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ontrackfam.app

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files \
            com.ontrackfam.app \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=@env:APP_STORE_CONNECT_PRIVATE_KEY \
            --issuer-id=$APP_STORE_CONNECT_ISSUER_ID \
            --key-id=$APP_STORE_CONNECT_KEY_IDENTIFIER
          keychain add-certificates
          xcode-project use-profiles

      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods
        script: find . -name "Podfile" -execdir pod install \;

      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

      email:
        recipients:
          - handynate15@gmail.com
        notify:
          success: true
          failure: true

  # ── Android APK Workflow ─────────────────────────────────────────────────────
  android-release:
    name: OnTrackFam Android APK
    max_build_duration: 30
    instance_type: linux_x2

    environment:
      flutter: 3.35.4

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build Android APK
        script: flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - handynate15@gmail.com
        notify:
          success: true
          failure: false
