name: ontrack
description: OnTrack - Family Chore Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: 6.1.5+1
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0
  uuid: ^4.5.1
  intl: ^0.19.0
  flutter_local_notifications: ^18.0.1
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  path: ^1.9.1
  table_calendar: ^3.1.2
  fl_chart: ^0.70.2
  flutter_slidable: ^3.1.1
  cached_network_image: ^3.4.1
  permission_handler: ^11.4.0
  timezone: ^0.9.4
  flutter_staggered_animations: ^1.1.1
  lottie: ^3.3.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
